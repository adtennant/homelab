---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
  interval: 5m
  values:
    ingress:
      enabled: true
      hosts:
        - host: headlamp.homelab.local
          paths:
            - path: /
              type: ImplementationSpecific
